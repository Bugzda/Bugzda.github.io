<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#101217">
  <meta name="description" content="MIXBAR und Angelkompass – zwei Apps, ein schneller Einstieg.">
  <title>App-Auswahl</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="launcher" aria-label="App-Auswahl">
    <a class="app-card mixbar" href="./mixbar/" aria-label="MIXBAR öffnen">
      <span class="app-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none">
          <path d="M10 13h44L32 37 10 13Z" stroke="currentColor" stroke-width="2.7"/>
          <path d="M32 37v14M21 54h22" stroke="currentColor" stroke-width="2.7" stroke-linecap="round"/>
          <path d="M17 21h30" stroke="currentColor" stroke-width="2" opacity=".55"/>
        </svg>
      </span>
      <span class="app-copy">
        <strong>MIXBAR</strong>
        <span>Cocktails aus deinen Zutaten.</span>
      </span>
      <span class="open-label">Öffnen <span aria-hidden="true">→</span></span>
    </a>

    <a class="app-card angelkompass" href="./angelkompass/" aria-label="Angelkompass öffnen">
      <span class="app-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none">
          <path d="M24 4.5 30.2 21.7 24 27l-6.2-5.3L24 4.5Z" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/>
          <path d="M24 7.2V25l-4.3-3.8L24 7.2Z" fill="currentColor"/>
          <path d="M5 32c4.75 0 4.75-2.5 9.5-2.5S19.25 32 24 32s4.75-2.5 9.5-2.5S38.25 32 43 32M8 39c4 0 4-2 8-2s4 2 8 2 4-2 8-2 4 2 8 2" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
      </span>
      <span class="app-copy">
        <strong>ANGELKOMPASS</strong>
        <span>Dein Plan für Spot und Köder.</span>
      </span>
      <span class="open-label">Öffnen <span aria-hidden="true">→</span></span>
    </a>
  </main>
</body>
</html>
