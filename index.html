<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a14">
    <title>🍹 Cocktail Mixer</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #13131f;
            --surface-elevated: #17172a;
            --surface2: #1c1c2e;
            --surface3: #252538;
            --accent: #ff6b35;
            --accent2: #ffd166;
            --green: #06d6a0;
            --yellow: #ffd166;
            --red: #ef476f;
            --blue: #4cc9f0;
            --text: #e8e8f0;
            --text-dim: #8888a8;
            --border: rgba(255,255,255,0.07);
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --glow: 0 18px 48px rgba(0,0,0,0.38);
            --radius: 14px;
            --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background:
                radial-gradient(circle at top left, rgba(255,107,53,0.14), transparent 28%),
                radial-gradient(circle at top right, rgba(76,201,240,0.12), transparent 24%),
                radial-gradient(circle at bottom center, rgba(6,214,160,0.1), transparent 30%),
                var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #1a0a2e 0%, #0a1628 50%, #0a2a1a 100%);
            padding: 1.5rem 2rem 1.2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            overflow: hidden;
            isolation: isolate;
        }
        header::before {
            content: '';
            position: absolute;
            inset: auto 0 -70% 0;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255,209,102,0.18), transparent 52%);
            pointer-events: none;
            z-index: -1;
        }
        header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'Avenir Next Condensed', 'Trebuchet MS', 'Segoe UI', sans-serif;
            background: linear-gradient(90deg, var(--accent2), var(--accent), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        header p { color: var(--text-dim); font-size: 0.88rem; margin-top: 0.2rem; }

        /* Layout */
        .layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: calc(100vh - 82px);
        }

        /* Sidebar */
        .sidebar {
            background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 28%), var(--surface);
            border-right: 1px solid var(--border);
            padding: 1rem;
            position: sticky;
            top: 82px;
            height: calc(100vh - 82px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--surface3) transparent;
        }
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

        .sidebar-section { margin-bottom: 1.1rem; }
        .sidebar-section-title {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            padding-bottom: 0.35rem;
            border-bottom: 1px solid var(--border);
        }
        #ingredientList { display: grid; gap: 0.75rem; }
        .sidebar-empty {
            color: var(--text-dim);
            font-size: 0.78rem;
            padding: 0.2rem 0.1rem 0.4rem;
        }

        /* Volume */
        .volume-selector { display: flex; gap: 0.35rem; flex-wrap: wrap; }
        .volume-btn {
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .volume-btn:hover { border-color: var(--accent); color: var(--text); }
        .volume-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        .volume-note { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.4rem; font-style: italic; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }
        .stat-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.45rem 0.3rem;
            text-align: center;
        }
        .stat-number { display: block; font-size: 1.3rem; font-weight: 700; line-height: 1; margin-bottom: 0.1rem; }
        .stat-number.green { color: var(--green); }
        .stat-number.yellow { color: var(--yellow); }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

        /* Sidebar buttons */
        .sidebar-btns { display: flex; gap: 0.4rem; margin-bottom: 0.75rem; }
        .sidebar-btn {
            flex: 1;
            padding: 0.38rem 0.4rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }
        .sidebar-btn:hover { color: var(--text); border-color: var(--text-dim); }
        .sidebar-btn.basics { border-color: rgba(6,214,160,0.3); color: var(--green); }
        .sidebar-btn.basics:hover { background: rgba(6,214,160,0.08); }
        .sidebar-btn.danger:hover { border-color: var(--red); color: var(--red); }

        /* Search inputs */
        .search-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.48rem 0.7rem;
            color: var(--text);
            font-size: 0.82rem;
            outline: none;
            margin-bottom: 0.75rem;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--text-dim); }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Ingredient categories */
        .ingredient-category {
            margin-bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.7rem 0.75rem;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
        }
        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.4rem;
            gap: 0.5rem;
        }
        .category-name-wrap { display: flex; align-items: center; gap: 0.45rem; min-width: 0; }
        .category-name { font-size: 0.74rem; font-weight: 700; color: var(--text); }
        .category-count {
            font-size: 0.63rem;
            font-weight: 700;
            color: var(--text-dim);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 999px;
            padding: 0.08rem 0.42rem;
        }
        .category-tools { display: flex; align-items: center; gap: 0.22rem; }
        .category-toggle {
            width: 1.7rem;
            height: 1.7rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.06);
            background: rgba(255,255,255,0.03);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }
        .category-toggle:hover { color: var(--text); border-color: rgba(255,255,255,0.14); }
        .category-toggle .chevron { font-size: 0.8rem; line-height: 1; transition: transform 0.18s ease; }
        .ingredient-category.collapsed .category-toggle .chevron { transform: rotate(-90deg); }
        .cat-btn {
            font-size: 0.64rem;
            color: var(--accent2);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.1rem 0.25rem;
            border-radius: 4px;
            opacity: 0.78;
            transition: opacity 0.15s;
        }
        .cat-btn:hover { opacity: 1; }
        .ingredient-pills { display: flex; flex-wrap: wrap; gap: 0.3rem; }
        .ingredient-category.collapsed .ingredient-pills { display: none; }
        .ingredient-pill {
            padding: 0.22rem 0.55rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .ingredient-pill:hover { border-color: rgba(255,255,255,0.2); color: var(--text); background: var(--surface3); }
        .ingredient-pill:active { transform: scale(0.95); }
        .volume-btn:active, .sidebar-btn:active, .near-toggle:active { transform: scale(0.95); }
        .ingredient-pill.selected {
            background: rgba(6,214,160,0.12);
            border-color: rgba(6,214,160,0.55);
            color: var(--green);
            font-weight: 500;
            box-shadow: 0 0 0 1px rgba(6,214,160,0.14) inset;
        }
        .pill-check { font-size: 0.65rem; display: none; }
        .ingredient-pill.selected .pill-check { display: inline; }

        /* Main */
        .main {
            padding: 1.25rem 1.5rem;
            background: linear-gradient(180deg, rgba(255,255,255,0.015), transparent 35%);
        }
        .main-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
            background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.85rem 0.95rem;
            box-shadow: var(--glow);
        }
        .main-header .search-input { flex: 1; min-width: 180px; margin-bottom: 0; }
        .results-title {
            display: flex;
            flex-direction: column;
            gap: 0.08rem;
            padding: 0.26rem 0.72rem;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.03);
            min-width: 132px;
        }
        .results-kicker {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .results-value { color: var(--text); font-size: 1.05rem; font-weight: 700; white-space: nowrap; }
        .near-toggle {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.78rem;
            color: var(--text-dim);
            cursor: pointer;
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 0.32rem 0.7rem;
            border-radius: 20px;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .near-toggle:hover { border-color: var(--yellow); color: var(--text); }
        .near-toggle.active { border-color: var(--yellow); color: var(--yellow); }

        /* Recipe grid */
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }

        /* Section heading in grid */
        .section-heading {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.25rem 0;
        }
        .section-heading span { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; }
        .section-heading::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        /* Recipe cards */
        .recipe-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)), var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
            position: relative;
        }
        .recipe-card::before { content: ''; display: block; height: 3px; background: rgba(255,255,255,0.08); }
        .recipe-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .recipe-grid.animate-in .recipe-card { animation: cardIn 0.25s ease-out both; }
        .recipe-card.possible {
            border-color: rgba(6,214,160,0.24);
            background: linear-gradient(180deg, rgba(6,214,160,0.07), rgba(255,255,255,0.015)), var(--surface);
        }
        .recipe-card.possible::before { background: linear-gradient(90deg, rgba(6,214,160,0), rgba(6,214,160,0.85), rgba(6,214,160,0)); }
        .recipe-card.possible:hover { border-color: rgba(6,214,160,0.45); }
        .recipe-card.near {
            border-color: rgba(255,209,102,0.18);
            background: linear-gradient(180deg, rgba(255,209,102,0.08), rgba(255,255,255,0.015)), var(--surface);
        }
        .recipe-card.near::before { background: linear-gradient(90deg, rgba(255,209,102,0), rgba(255,209,102,0.9), rgba(255,209,102,0)); }
        .recipe-card.near:hover { border-color: rgba(255,209,102,0.35); }
        .recipe-card.volume {
            border-color: rgba(76,201,240,0.18);
            background: linear-gradient(180deg, rgba(76,201,240,0.08), rgba(255,255,255,0.015)), var(--surface);
        }
        .recipe-card.volume::before { background: linear-gradient(90deg, rgba(76,201,240,0), rgba(76,201,240,0.9), rgba(76,201,240,0)); }

        .card-top { padding: 0.9rem 1rem 0.65rem; display: flex; align-items: flex-start; gap: 0.65rem; }
        .card-emoji { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
        .card-info { flex: 1; min-width: 0; }
        .card-name { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { display: flex; gap: 0.35rem; margin-top: 0.15rem; flex-wrap: wrap; }
        .badge {
            font-size: 0.63rem;
            font-weight: 700;
            padding: 0.12rem 0.4rem;
            border-radius: 20px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        .badge-cat { background: var(--surface3); color: var(--text-dim); }
        .badge-ok { background: rgba(6,214,160,0.13); color: var(--green); }
        .badge-near { background: rgba(255,209,102,0.12); color: var(--yellow); }
        .badge-volume { background: rgba(76,201,240,0.12); color: var(--blue); }
        .card-desc { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; line-height: 1.4; }

        .card-body { padding: 0 1rem 0.8rem; flex: 1; display: flex; flex-direction: column; gap: 0; }
        .divider { height: 1px; background: var(--border); margin: 0.55rem 0; }
        .section-label { font-size: 0.63rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.4rem; }

        /* Ingredient rows */
        .ingredient-row { display: flex; align-items: center; gap: 0.45rem; padding: 0.18rem 0; }
        .amount-block { min-width: 52px; text-align: right; flex-shrink: 0; }
        .amount { font-size: 0.92rem; font-weight: 700; color: var(--accent2); }
        .amount-unit { font-size: 0.68rem; color: var(--text-dim); margin-left: 0.08rem; }
        .ing-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
        .ing-dot.ok { background: var(--green); }
        .ing-dot.miss { background: var(--red); }
        .ing-dot.neutral { background: var(--text-dim); }
        .ing-name { flex: 1; font-size: 0.8rem; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .ing-name.miss { color: var(--red); text-decoration: line-through; opacity: 0.7; }

        /* Missing box */
        .missing-box {
            margin-top: 0.5rem;
            padding: 0.38rem 0.55rem;
            background: rgba(239,71,111,0.08);
            border: 1px solid rgba(239,71,111,0.18);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
        }
        .missing-label { color: var(--red); font-weight: 600; }
        .missing-items { color: var(--text-dim); }
        .scale-note {
            margin-top: 0.5rem;
            padding: 0.45rem 0.55rem;
            background: rgba(255,209,102,0.08);
            border: 1px solid rgba(255,209,102,0.2);
            border-radius: var(--radius-sm);
            font-size: 0.75rem;
            color: var(--text-dim);
        }
        .scale-note strong { color: var(--yellow); }

        /* Steps */
        .steps-list {
            margin: 0.3rem 0 0 1.1rem;
            font-size: 0.76rem;
            color: var(--text-dim);
            line-height: 1.55;
        }
        .steps-list li { margin-bottom: 0.1rem; }
        .steps-list li::marker { color: var(--accent); }

        /* Card footer */
        .card-footer {
            padding: 0.45rem 1rem 0.7rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .footer-label { font-size: 0.63rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-dim); flex-shrink: 0; }
        .garnish-text {
            font-size: 0.74rem;
            color: var(--text-dim);
            font-style: italic;
            flex: 1 1 180px;
            min-width: 0;
            white-space: normal;
            overflow-wrap: anywhere;
            line-height: 1.4;
        }
        .total-badge { font-size: 0.68rem; font-weight: 700; color: var(--blue); background: rgba(76,201,240,0.08); border: 1px solid rgba(76,201,240,0.18); padding: 0.12rem 0.45rem; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

        /* Empty / hint states */
        .empty-state, .hint-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3.5rem 2rem;
            color: var(--text-dim);
        }
        .empty-state .icon, .hint-state .icon { font-size: 2.8rem; margin-bottom: 0.75rem; }
        .empty-state h3, .hint-state h3 { font-size: 1.05rem; margin-bottom: 0.4rem; color: var(--text); }
        .empty-state p, .hint-state p { font-size: 0.82rem; max-width: 340px; margin: 0 auto; }

        /* ── iPhone / Mobile ─────────────────────────── */
        .tab-bar { display: none; }

        @media (max-width: 760px) {
            body { padding-bottom: calc(60px + env(safe-area-inset-bottom)); }

            header {
                padding: 0.9rem 1rem 0.75rem;
                padding-top: calc(0.9rem + env(safe-area-inset-top));
                position: sticky;
                top: 0;
            }
            header h1 { font-size: 1.4rem; }
            header p { display: none; }

            .layout { grid-template-columns: 1fr; }

            /* Panels hidden by default on mobile — tab controls visibility */
            .sidebar {
                display: none;
                position: static;
                height: auto;
                border-right: none;
                border-bottom: none;
                max-height: none;
                padding: 1rem;
            }
            .sidebar.mobile-active { display: block; }

            .main {
                display: none;
                padding: 0.9rem;
            }
            .main.mobile-active { display: block; }

            .recipe-grid { grid-template-columns: 1fr; }

            /* Prevent iOS zoom on input focus — min 16px */
            .search-input { font-size: 16px; }
            .volume-btn { font-size: 0.9rem; padding: 0.45rem 0.75rem; }
            .ingredient-pill { font-size: 0.85rem; padding: 0.3rem 0.65rem; }
            .sidebar-btn { font-size: 0.85rem; padding: 0.5rem; }

            /* Tab bar */
            .tab-bar {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                height: calc(60px + env(safe-area-inset-bottom));
                padding-bottom: env(safe-area-inset-bottom);
                background: rgba(19,19,31,0.95);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border-top: 1px solid var(--border);
                z-index: 200;
            }
            .tab-btn {
                flex: 1;
                background: none;
                border: none;
                color: var(--text-dim);
                font-family: inherit;
                font-size: 0.68rem;
                font-weight: 600;
                letter-spacing: 0.3px;
                cursor: pointer;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.22rem;
                padding: 0.5rem 0;
                transition: color 0.15s;
                -webkit-tap-highlight-color: transparent;
            }
            .tab-btn .tab-icon { font-size: 1.4rem; line-height: 1; }
            .tab-btn.active { color: var(--accent); }
            .tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px var(--accent)); }

            /* Stats row fits mobile */
            .stats-row { gap: 0.35rem; }
            .stat-number { font-size: 1.1rem; }

            /* Card layout on mobile */
            .card-top { padding: 0.8rem 0.9rem 0.55rem; }
            .card-body { padding: 0 0.9rem 0.7rem; }
            .card-footer { padding: 0.4rem 0.9rem 0.6rem; }

            /* Main header on mobile */
            .main-header { flex-wrap: wrap; gap: 0.5rem; }
            .near-toggle { font-size: 0.75rem; }
        }

        /* Extra small phones */
        @media (max-width: 380px) {
            .stats-row { grid-template-columns: repeat(3, 1fr); }
            .volume-selector { gap: 0.25rem; }
            .volume-btn { padding: 0.35rem 0.5rem; font-size: 0.82rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation: none !important;

//  HELPERS
// ════════════════════════════════════════════════════

function normalizeText(value) {
    return String(value ?? '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
}

function escapeHtml(value) {
    return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function readStorageRaw(key, fallback = null) {
    try {
        const value = localStorage.getItem(key);
        return value === null ? fallback : value;
    } catch {
        return fallback;
    }
}

function readStorageArray(key) {
    try {
        const parsed = JSON.parse(readStorageRaw(key, '[]'));
        return Array.isArray(parsed) ? parsed : [];
    } catch {
        return [];
    }
}

function readStorageBoolean(key, fallback = false) {
    return readStorageRaw(key, fallback ? 'true' : 'false') === 'true';
}

function readStorageNumber(key, fallback) {
    const value = parseInt(readStorageRaw(key, String(fallback)), 10);
    return Number.isFinite(value) ? value : fallback;
}

function writeStorage(key, value) {
    try {
        localStorage.setItem(key, value);
    } catch {
        // Ignore storage errors and keep the app usable.
    }
}

function debounce(fn, wait) {
    let timeoutId = 0;
    return (...args) => {
        window.clearTimeout(timeoutId);
        timeoutId = window.setTimeout(() => fn(...args), wait);
    };
}

function formatCl(cl) {
    if (!Number.isFinite(cl)) return '0';
    return String(Math.round(cl));
}

const INGREDIENT_MAP = new Map();
const CATEGORY_NAMES = new Set();

INGREDIENT_CATEGORIES.forEach(cat => {
    cat.searchName = normalizeText(cat.name);
    CATEGORY_NAMES.add(cat.name);
    cat.items.forEach(item => {
        item.searchName = normalizeText(item.name);
        INGREDIENT_MAP.set(item.id, item);
    });
});

RECIPES.forEach(recipe => {
    recipe.searchName = normalizeText(recipe.name);
    recipe.searchDesc = normalizeText(recipe.desc);
});

const VALID_INGREDIENT_IDS = new Set(INGREDIENT_MAP.keys());

selectedIngredients = new Set(readStorageArray(STORAGE_KEYS.ingredients).filter(id => VALID_INGREDIENT_IDS.has(id)));
targetVolume = readStorageNumber(STORAGE_KEYS.volume, 20);
targetVolume = VOLUMES.includes(targetVolume) ? targetVolume : 20;
showNear = readStorageBoolean(STORAGE_KEYS.showNear, false);
collapsedCategories = new Set(readStorageArray(STORAGE_KEYS.collapsedCategories).filter(name => CATEGORY_NAMES.has(name)));

function findIngredient(id) {
    return INGREDIENT_MAP.get(id) || null;
}

// ════════════════════════════════════════════════════
//  SCALING & MATCHING
// ════════════════════════════════════════════════════

const scaleCache = new Map();

function scaleRecipe(recipe) {
    const cacheKey = `${recipe.name}|${targetVolume}`;
    if (scaleCache.has(cacheKey)) return scaleCache.get(cacheKey);

    const totalParts = recipe.ingredients.reduce((sum, item) => sum + item.parts, 0);
    const totalUnits = Math.round(targetVolume / SCALE_STEP);
    const minUnits = recipe.ingredients.length;

    if (totalUnits < minUnits) {
        const minVolume = recipe.ingredients.length * SCALE_STEP;
        const suggestedVolume = VOLUMES.find(volume => volume >= minVolume) || minVolume;
        const invalidResult = { valid: false, minVolume, suggestedVolume };
        scaleCache.set(cacheKey, invalidResult);
        return invalidResult;
    }

    const rawUnits = recipe.ingredients.map(item => item.parts * totalUnits / totalParts);
    const flooredUnits = rawUnits.map(value => Math.floor(value));
    let remainingUnits = totalUnits - flooredUnits.reduce((sum, value) => sum + value, 0);
    const assignedUnits = [...flooredUnits];

    const ranking = rawUnits
        .map((value, index) => ({
            index,
            frac: value - Math.floor(value),
            parts: recipe.ingredients[index].parts,
        }))
        .sort((a, b) => b.frac - a.frac || b.parts - a.parts || a.index - b.index);

    for (let i = 0; i < remainingUnits; i++) {
        assignedUnits[ranking[i % ranking.length].index]++;
    }

    const result = {
        valid: true,
        totalVolume: targetVolume,
        items: recipe.ingredients.map((ingredient, index) => ({
            ...ingredient,
            volume: assignedUnits[index] * SCALE_STEP,
        })),
    };

    scaleCache.set(cacheKey, result);
    return result;
}

function recipeStatus(recipe) {
    const scaled = scaleRecipe(recipe);
    const missing = recipe.ingredients.filter(ingredient => !selectedIngredients.has(ingredient.id));
    if (selectedIngredients.size === 0) return { status: 'neutral', missing, scaled, recipe };
    if (missing.length === 0 && !scaled.valid) return { status: 'volume', missing, scaled, recipe };
    if (missing.length === 0) return { status: 'possible', missing, scaled, recipe };
    if (missing.length <= 2) return { status: 'near', missing, scaled, recipe };
    return { status: 'unavailable', missing, scaled, recipe };
}

// ════════════════════════════════════════════════════
//  DOM
// ════════════════════════════════════════════════════

const elements = {
    volumeSelector: document.getElementById('volumeSelector'),
    ingredientList: document.getElementById('ingredientList'),
    recipeGrid: document.getElementById('recipeGrid'),
    ingredientSearch: document.getElementById('ingredientSearch'),
    cocktailSearch: document.getElementById('cocktailSearch'),
    resultCount: document.getElementById('resultCount'),
    resultLabel: document.getElementById('resultLabel'),
    statSelected: document.getElementById('statSelected'),
    statFull: document.getElementById('statFull'),
    statNear: document.getElementById('statNear'),
    nearCount: document.getElementById('nearCount'),
    panelZutaten: document.getElementById('panelZutaten'),
    panelCocktails: document.getElementById('panelCocktails'),
    tabZutaten: document.getElementById('tabZutaten'),
    tabCocktails: document.getElementById('tabCocktails'),
    nearToggle: document.getElementById('nearToggle'),
    nearIcon: document.getElementById('nearIcon'),
};

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════

let lastVolumeMarkup = '';
let lastIngredientMarkup = '';
let lastRecipeMarkup = '';
let hasAnimatedRecipes = false;
let renderFrame = 0;
let resizeFrame = 0;

const pendingRender = {
    save: false,
    volumes: false,
    ingredients: false,
    recipes: false,
    tabs: false,
};

function queueRender(flags) {
    Object.entries(flags).forEach(([key, value]) => {
        if (value) pendingRender[key] = true;
    });

    if (renderFrame) return;
    renderFrame = window.requestAnimationFrame(() => {
        renderFrame = 0;
        flushRender();
    });
}

function flushRender() {
    if (pendingRender.save) saveState();
    if (pendingRender.volumes) renderVolumes();
    if (pendingRender.ingredients) renderIngredients();
    if (pendingRender.recipes) renderRecipes();
    if (pendingRender.tabs) syncTabUI();

    pendingRender.save = false;
    pendingRender.volumes = false;
    pendingRender.ingredients = false;
    pendingRender.recipes = false;
    pendingRender.tabs = false;
}

function renderVolumes() {
    const nextMarkup = VOLUMES.map(volume =>
        `<button type="button" class="volume-btn${volume === targetVolume ? ' active' : ''}" data-action="set-volume" data-volume="${volume}" aria-pressed="${volume === targetVolume}">${volume} cl</button>`
    ).join('');

    if (nextMarkup !== lastVolumeMarkup) {
        elements.volumeSelector.innerHTML = nextMarkup;
        lastVolumeMarkup = nextMarkup;
    }
}

function renderIngredients() {
    const search = normalizeText(ingSearch);
    const nextMarkup = INGREDIENT_CATEGORIES.map(category => {
        const items = category.items.filter(item => !search || item.searchName.includes(search));
        if (!items.length) return '';

        const selectedCount = category.items.filter(item => selectedIngredients.has(item.id)).length;
        const isCollapsed = !search && collapsedCategories.has(category.name);

        return `
            <div class="ingredient-category${isCollapsed ? ' collapsed' : ''}">
                <div class="category-header">
                    <div class="category-name-wrap">
                        <button type="button" class="category-toggle" data-action="toggle-category" data-category="${escapeHtml(category.name)}" aria-expanded="${String(!isCollapsed)}" aria-label="${isCollapsed ? 'Kategorie öffnen' : 'Kategorie schließen'}">
                            <span class="chevron">▾</span>
                        </button>
                        <span class="category-name">${escapeHtml(category.name)}</span>
                        <span class="category-count">${selectedCount}/${category.items.length}</span>
                    </div>
                    <div class="category-tools">
                        <button type="button" class="cat-btn" data-action="select-category" data-category="${escapeHtml(category.name)}">Alle</button>
                        <button type="button" class="cat-btn" style="color:var(--text-dim)" data-action="clear-category" data-category="${escapeHtml(category.name)}">Keine</button>
                    </div>
                </div>
                <div class="ingredient-pills">
                    ${items.map(item => {
                        const isSelected = selectedIngredients.has(item.id);
                        return `
                            <button type="button" class="ingredient-pill${isSelected ? ' selected' : ''}" data-action="toggle-ingredient" data-id="${escapeHtml(item.id)}" aria-pressed="${isSelected}">
                                <span class="pill-check">✓</span>${item.emoji} ${escapeHtml(item.name)}
                            </button>`;
                    }).join('')}
                </div>
            </div>`;
    }).join('') || `<p class="sidebar-empty">Keine passende Zutat gefunden.</p>`;

    if (nextMarkup !== lastIngredientMarkup) {
        elements.ingredientList.innerHTML = nextMarkup;
        lastIngredientMarkup = nextMarkup;
    }
}

function renderStats(possible, near) {
    elements.statSelected.textContent = selectedIngredients.size;
    elements.statFull.textContent = possible;
    elements.statNear.textContent = near;
    elements.nearCount.textContent = near > 0 ? `(${near})` : '';
}

function renderRecipes() {
    const search = normalizeText(cocktailSearch);
    const filtered = (search ? RECIPES.filter(recipe =>
        recipe.searchName.includes(search) || recipe.searchDesc.includes(search)
    ) : [...RECIPES]).sort((a, b) => a.name.localeCompare(b.name, 'de'));

    const possible = [];
    const near = [];
    const volumeLimited = [];

    filtered.forEach(recipe => {
        const match = recipeStatus(recipe);
        if (match.status === 'possible') possible.push(match);
        else if (match.status === 'near') near.push(match);
        else if (match.status === 'volume') volumeLimited.push(match);
    });

    // Sort: possible alphabetically, near by missing count then alphabetically
    near.sort((a, b) => a.missing.length - b.missing.length || a.recipe.name.localeCompare(b.recipe.name, 'de'));
    volumeLimited.sort((a, b) => a.recipe.name.localeCompare(b.recipe.name, 'de'));

    let nextMarkup = '';

    if (selectedIngredients.size === 0) {
        if (!search) {
            elements.resultCount.textContent = '0';
            elements.resultLabel.textContent = 'Cocktails';
            nextMarkup = `
                <div class="hint-state">
                    <div class="icon">🍹</div>
                    <h3>Wähle deine Zutaten</h3>
                    <p>${window.innerWidth <= MOBILE_BREAKPOINT
                        ? 'Wechsle zum <strong>Zutaten</strong>-Tab oder wähle dort <strong>Bar-Basics</strong> um sofort loszulegen.'
                        : 'Klicke links auf Zutaten oder wähle <strong>Bar-Basics</strong> um sofort loszulegen.'}</p>
                </div>`;
            renderStats(0, 0);
            applyRecipeMarkup(nextMarkup);
            return;
        }

        // Suche aktiv, aber keine Zutaten: alle passenden Cocktails neutral anzeigen
        elements.resultCount.textContent = filtered.length;
        elements.resultLabel.textContent = 'Cocktails';
        renderStats(0, 0);
        nextMarkup = filtered.length === 0
            ? `
                <div class="empty-state">
                    <div class="icon">😔</div>
                    <h3>Keine Cocktails gefunden</h3>
                    <p>Versuche einen anderen Suchbegriff.</p>
                </div>`
            : filtered.map((recipe, index) => renderCard({ recipe, status: 'neutral', missing: [], scaled: scaleRecipe(recipe) }, index)).join('');
        applyRecipeMarkup(nextMarkup);
        return;
    }

    const visibleCount = possible.length + volumeLimited.length + (showNear ? near.length : 0);
    elements.resultCount.textContent = visibleCount;
    elements.resultLabel.textContent = 'Cocktails';
    renderStats(possible.length, near.length);

    const cards = [];

    if (possible.length > 0) {
        cards.push(`<div class="section-heading"><span>Jetzt mixbar — ${possible.length} Cocktails</span></div>`);
        possible.forEach((entry, index) => cards.push(renderCard(entry, index)));
    }

    if (showNear && near.length > 0) {
        cards.push(`<div class="section-heading"><span>Fast möglich — ${near.length} Cocktails (1–2 Zutaten fehlen)</span></div>`);
        near.forEach((entry, index) => cards.push(renderCard(entry, possible.length + index)));
    }

    if (volumeLimited.length > 0) {
        cards.push(`<div class="section-heading"><span>Mehr Volumen empfohlen — ${volumeLimited.length} Cocktails</span></div>`);
        volumeLimited.forEach((entry, index) => cards.push(renderCard(entry, possible.length + near.length + index)));
    }

    if (cards.length === 0) {
        nextMarkup = `
            <div class="empty-state">
                <div class="icon">😔</div>
                <h3>Keine Cocktails gefunden</h3>
                <p>Wähle mehr Zutaten, aktiviere „Fast möglich" oder ändere die Suche.</p>
            </div>`;
        applyRecipeMarkup(nextMarkup);
        return;
    }

    nextMarkup = cards.join('');
    applyRecipeMarkup(nextMarkup);
}

function applyRecipeMarkup(markup) {
    if (markup === lastRecipeMarkup) return;

    const shouldAnimate = !hasAnimatedRecipes && markup.includes('recipe-card');
    elements.recipeGrid.classList.toggle('animate-in', shouldAnimate);
    elements.recipeGrid.innerHTML = markup;
    lastRecipeMarkup = markup;

    if (shouldAnimate) hasAnimatedRecipes = true;
}

function renderCard(entry, index = 0) {
    const { recipe, status, missing, scaled } = entry;
    const missingIds = new Set(missing.map(item => item.id));
    const scaledItems = scaled.valid ? scaled.items : [];
    const totalVol = scaled.valid ? scaled.totalVolume : null;

    const statusBadge = status === 'possible'
        ? `<span class="badge badge-ok">✓ Mixbar</span>`
        : status === 'volume'
        ? `<span class="badge badge-volume">↕ Mehr Volumen</span>`
        : status === 'neutral'
        ? ``
        : `<span class="badge badge-near">⚠ ${missing.length} fehlt${missing.length > 1 ? 'en' : ''}</span>`;

    const ingRows = scaledItems.map(ing => {
        const isMiss = missingIds.has(ing.id);
        const ingData = findIngredient(ing.id);
        const cl = ing.volume;
        return `
            <div class="ingredient-row">
                <div class="amount-block">
                    <span class="amount">${formatCl(cl)}</span><span class="amount-unit">cl</span>
                </div>
                <div class="ing-dot ${status === 'neutral' ? 'neutral' : isMiss ? 'miss' : 'ok'}"></div>
                <div class="ing-name${isMiss ? ' miss' : ''}">${escapeHtml(ingData ? ingData.name : ing.id)}</div>
            </div>`;
    }).join('');

    const scaleNote = scaled.valid ? '' : `
        <div class="scale-note">
            <strong>Für ${formatCl(targetVolume)} cl zu klein:</strong> Ab ${formatCl(scaled.suggestedVolume)} cl lässt sich dieses Rezept in ganzen cl sauber verteilen.
        </div>`;

    const missingBox = missing.length > 0 ? `
        <div class="missing-box">
            <span class="missing-label">Fehlt noch: </span>
            <span class="missing-items">${missing.map(item => {
                const ingredient = findIngredient(item.id);
                return escapeHtml(ingredient ? ingredient.name : item.id);
            }).join(', ')}</span>
        </div>` : '';

    const stepsList = recipe.steps && recipe.steps.length > 0 ? `
        <div class="divider"></div>
        <div class="section-label">Zubereitung</div>
        <ol class="steps-list">
            ${recipe.steps.map(step => `<li>${escapeHtml(step)}</li>`).join('')}
        </ol>` : '';

    return `
        <div class="recipe-card ${status}" style="animation-delay:${Math.min(index * 0.04, 0.5)}s">
            <div class="card-top">
                <div class="card-emoji">${escapeHtml(recipe.emoji)}</div>
                <div class="card-info">
                    <div class="card-name">${escapeHtml(recipe.name)}</div>
                    <div class="card-meta">
                        <span class="badge badge-cat">${escapeHtml(recipe.category)}</span>
                        ${statusBadge}
                    </div>
                    <div class="card-desc">${escapeHtml(recipe.desc)}</div>
                </div>
            </div>
            <div class="card-body">
                <div class="divider"></div>
                <div class="section-label">Zutaten</div>
                ${ingRows}
                ${scaleNote}
                ${missingBox}
                ${stepsList}
            </div>
            <div class="card-footer">
                <span class="footer-label">Garnitur:</span>
                <span class="garnish-text">${escapeHtml(recipe.garnish)}</span>
                <span class="total-badge">${scaled.valid ? `∑ ${formatCl(totalVol)} cl` : `ab ${formatCl(scaled.suggestedVolume)} cl`}</span>
            </div>
        </div>`;
}

// ════════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════════

function toggleIngredient(id) {
    if (!VALID_INGREDIENT_IDS.has(id)) return;
    selectedIngredients.has(id) ? selectedIngredients.delete(id) : selectedIngredients.add(id);
    queueRender({ save: true, ingredients: true, recipes: true });
}

function selectCategory(name) {
    const category = INGREDIENT_CATEGORIES.find(item => item.name === name);
    if (!category) return;
    category.items.forEach(item => selectedIngredients.add(item.id));
    queueRender({ save: true, ingredients: true, recipes: true });
}

function clearCategory(name) {
    const category = INGREDIENT_CATEGORIES.find(item => item.name === name);
    if (!category) return;
    category.items.forEach(item => selectedIngredients.delete(item.id));
    queueRender({ save: true, ingredients: true, recipes: true });
}

function toggleCategory(name) {
    if (!CATEGORY_NAMES.has(name)) return;
    collapsedCategories.has(name) ? collapsedCategories.delete(name) : collapsedCategories.add(name);
    queueRender({ save: true, ingredients: true });
}

function clearAll() {
    selectedIngredients.clear();
    queueRender({ save: true, ingredients: true, recipes: true });
}

function selectBasics() {
    BAR_BASICS.forEach(id => selectedIngredients.add(id));
    if (window.innerWidth <= MOBILE_BREAKPOINT) activeTab = 'cocktails';
    queueRender({ save: true, ingredients: true, recipes: true, tabs: true });
}

function setVolume(v) {
    if (!VOLUMES.includes(v) || v === targetVolume) return;
    targetVolume = v;
    scaleCache.clear();
    queueRender({ save: true, volumes: true, recipes: true });
}

function toggleNear() {
    showNear = !showNear;
    queueRender({ save: true, recipes: true, tabs: true });
}

function saveState() {
    writeStorage(STORAGE_KEYS.ingredients, JSON.stringify([...selectedIngredients]));
    writeStorage(STORAGE_KEYS.volume, String(targetVolume));
    writeStorage(STORAGE_KEYS.showNear, String(showNear));
    writeStorage(STORAGE_KEYS.collapsedCategories, JSON.stringify([...collapsedCategories]));
}

function renderAll() {
    queueRender({ save: true, volumes: true, ingredients: true, recipes: true, tabs: true });
}

// ── Mobile tab switching ──────────────────────────
function switchTab(tab) {
    activeTab = tab === 'cocktails' ? 'cocktails' : 'zutaten';
    queueRender({ tabs: true });
}

function syncTabUI() {
    const isMobile = window.innerWidth <= MOBILE_BREAKPOINT;
    const showIngredients = activeTab === 'zutaten';

    elements.panelZutaten.classList.toggle('mobile-active', isMobile && showIngredients);
    elements.panelCocktails.classList.toggle('mobile-active', isMobile && !showIngredients);
    elements.tabZutaten.classList.toggle('active', showIngredients);
    elements.tabCocktails.classList.toggle('active', !showIngredients);
    elements.tabZutaten.setAttribute('aria-selected', String(showIngredients));
    elements.tabCocktails.setAttribute('aria-selected', String(!showIngredients));
    elements.panelZutaten.toggleAttribute('hidden', isMobile && !showIngredients);
    elements.panelCocktails.toggleAttribute('hidden', isMobile && showIngredients);
    elements.nearToggle.classList.toggle('active', showNear);
    elements.nearIcon.textContent = showNear ? '●' : '○';
}

function applyMobileLayout() {
    queueRender({ tabs: true });
}

window.addEventListener('resize', () => {
    if (resizeFrame) return;
    resizeFrame = window.requestAnimationFrame(() => {
        resizeFrame = 0;
        applyMobileLayout();
    });
});

document.addEventListener('click', event => {
    const trigger = event.target.closest('[data-action]');
    if (!trigger) return;

    const { action } = trigger.dataset;

    if (action === 'switch-tab') switchTab(trigger.dataset.tab);
    else if (action === 'select-basics') selectBasics();
    else if (action === 'clear-all') clearAll();
    else if (action === 'toggle-near') toggleNear();
    else if (action === 'set-volume') setVolume(Number(trigger.dataset.volume));
    else if (action === 'toggle-ingredient') toggleIngredient(trigger.dataset.id);
    else if (action === 'select-category') selectCategory(trigger.dataset.category);
    else if (action === 'clear-category') clearCategory(trigger.dataset.category);
    else if (action === 'toggle-category') toggleCategory(trigger.dataset.category);
});

// Events
const handleIngredientSearch = debounce(value => {
    const nextValue = value.trim();
    if (nextValue === ingSearch) return;
    ingSearch = nextValue;
    queueRender({ ingredients: true });
}, SEARCH_DEBOUNCE_MS);

const handleCocktailSearch = debounce(value => {
    const nextValue = value.trim();
    if (nextValue === cocktailSearch) return;
    cocktailSearch = nextValue;
    queueRender({ recipes: true });
}, SEARCH_DEBOUNCE_MS);

elements.ingredientSearch.addEventListener('input', event => {
    handleIngredientSearch(event.target.value);
});
elements.cocktailSearch.addEventListener('input', event => {
    handleCocktailSearch(event.target.value);
});

saveState();
renderVolumes();
renderIngredients();
renderRecipes();
syncTabUI();
</script>
</body>
</html>
